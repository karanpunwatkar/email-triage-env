name: email_triage_env
version: 1.0.0
description: Email triage environment for classifying and responding to emails
author: karanpunwatkar

endpoints:
  reset: /reset
  step: /step
  state: /state

observation_space:
  type: object
  properties:
    sender:
      type: string
    subject:
      type: string
    body:
      type: string
    last_action_result:
      type: string

action_space:
  type: object
  properties:
    action_type:
      type: string
      enum: [classify, reply, escalate, acknowledge]
    priority:
      type: string
      enum: [low, medium, high]
    content:
      type: string

reward_range: [0.0, 1.0]
